<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REB/USDT 兑换合约管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.7.0/dist/web3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #3a86ff, #8338ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .wallet-section {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .wallet-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .wallet-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef476f;
        }
        
        .status-dot.connected {
            background: #06d6a0;
        }
        
        .wallet-address {
            background: #0f172a;
            padding: 8px 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.9rem;
        }
        
        .network-info {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        
        .btn {
            padding: 10px 20px;
            background: #3a86ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn:hover {
            background: #2a75ff;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #06d6a0;
        }
        
        .btn-success:hover {
            background: #05c490;
        }
        
        .btn-warning {
            background: #ff9e00;
        }
        
        .btn-warning:hover {
            background: #e68e00;
        }
        
        .btn-danger {
            background: #ef476f;
        }
        
        .btn-danger:hover {
            background: #e63e6a;
        }
        
        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #3a86ff;
        }
        
        .stat-title {
            color: #cbd5e1;
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
        }
        
        .function-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .function-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 25px;
        }
        
        .card-title {
            font-size: 1.2rem;
            color: white;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 12px 15px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1rem;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #3a86ff;
        }
        
        .info-box {
            background: #0f172a;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            border-left: 4px solid #3a86ff;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        
        .logs-section {
            background: #1e293b;
            border-radius: 12px;
            padding: 25px;
        }
        
        .logs-container {
            background: #0f172a;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 10px;
            border-bottom: 1px solid #334155;
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .log-type {
            color: #3a86ff;
            font-weight: bold;
        }
        
        .log-success {
            color: #06d6a0;
        }
        
        .log-error {
            color: #ef476f;
        }
        
        .log-warning {
            color: #ff9e00;
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #475569;
            transition: .4s;
            border-radius: 34px;
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .toggle-slider {
            background: #06d6a0;
        }
        
        input:checked + .toggle-slider:before {
            transform: translateX(30px);
        }
        
        .toggle-label {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        @media (max-width: 768px) {
            .function-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .wallet-section {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

        </div>
        
        <div class="function-grid">
            <!-- 兑换功能 -->

                <div class="form-group">

                    <input type="number" id="rebAmount" placeholder="输入要兑换的REB数量" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label>预计获得 USDT: <span id="estimatedUsdt" style="color: #06d6a0; font-weight: bold;">0</span></label>
                </div>
                <button class="btn btn-success" id="exchangeBtn" style="width: 100%;">
                    <span>执行兑换</span>
                </button>
                <div class="info-box">
                    注意: 兑换前请确保已授权合约使用您的REB代币
                </div>
            </div>
            
            <!-- 合约管理 -->
            <div class="function-card">
                <div class="card-title">合约管理</div>
                <div class="form-group">
                    <label>合约开关</label>
                    <div class="toggle-label">
                        <label class="toggle-switch">
                            <input type="checkbox" id="enabledToggle">
                            <span class="toggle-slider"></span>
                        </label>
                        <span id="enabledStatus">合约已禁用</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="newPrice">设置新价格</label>
                    <input type="number" id="newPrice" placeholder="输入新的REB/USDT价格" min="0" step="0.001">
                </div>
                <button class="btn btn-warning" id="updatePriceBtn" style="width: 100%;">
                    <span>更新价格</span>
                </button>
                <div class="info-box">
                    只有合约所有者可以修改合约设置
                </div>
            </div>
            
            <!-- 资金管理 -->
            <div class="function-card">
                <div class="card-title">资金管理</div>
                <div class="form-group">
                    <label for="withdrawToken">提取代币</label>
                    <select id="withdrawToken">
                        <option value="">选择代币类型</option>
                        <option value="REB">REB</option>
                        <option value="USDT">USDT</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="withdrawAmount">提取数量</label>
                    <input type="number" id="withdrawAmount" placeholder="输入提取数量" min="0" step="0.01">
                </div>
                <button class="btn btn-danger" id="withdrawBtn" style="width: 100%;">
                    <span>提取代币</span>
                </button>
                <div class="info-box">
                    只有合约所有者可以提取合约中的代币
                </div>
            </div>
        </div>
        
        <div class="logs-section">
            <div class="card-title">事件日志</div>
            <div class="logs-container" id="logsContainer">
                <div class="log-entry">
                    <span class="log-type">系统:</span> 页面已加载，请连接钱包开始使用
                </div>
            </div>
        </div>
    </div>

        // 添加日志
        function addLog(message, type = 'info') {
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            
            let typeText = '';
            if (type === 'success') {
                typeText = '<span class="log-success">成功:</span>';
            } else if (type === 'error') {
                typeText = '<span class="log-error">错误:</span>';
            } else if (type === 'warning') {
                typeText = '<span class="log-warning">警告:</span>';
            } else {
                typeText = '<span class="log-type">系统:</span>';
            }
            
            logEntry.innerHTML = typeText + ' ' + message;
            logsContainer.prepend(logEntry);
            
            // 限制日志数量
            if (logsContainer.children.length > 20) {
                logsContainer.removeChild(logsContainer.lastChild);
            }
        }
        
        // 更新状态
        function updateStatus(connected) {
            if (connected) {
                statusDot.className = 'status-dot connected';
                statusText.textContent = '已连接';
                statusText.style.color = '#06d6a0';
            } else {
                statusDot.className = 'status-dot';
                statusText.textContent = '未连接';
                statusText.style.color = '#ef476f';
            }
        }
        
        // 连接钱包
        async function connectWallet() {
            try {
                if (typeof window.ethereum === 'undefined') {
                    addLog('未检测到Web3钱包，请安装MetaMask', 'error');
                    alert('请安装MetaMask或其他Web3钱包');
                    return;
                }
                
                addLog('正在连接钱包...', 'info');
                
                // 请求账户访问
                const accounts = await window.ethereum.request({ 
                    method: 'eth_requestAccounts' 
                });
                
                userAddress = accounts[0];
                web3 = new Web3(window.ethereum);
                
                // 更新UI
                const shortAddress = userAddress.substring(0, 6) + '...' + userAddress.substring(userAddress.length - 4);
                walletAddress.textContent = shortAddress;
                walletAddress.style.display = 'block';
                updateStatus(true);
                setContractBtn.style.display = 'inline-flex';
                connectWalletBtn.disabled = true;
                connectWalletBtn.innerHTML = '<span>已连接</span>';
                
                // 获取网络信息
                const chainId = await web3.eth.getChainId();
                updateNetworkInfo(chainId);
                
                addLog(`钱包连接成功: ${shortAddress}`, 'success');
                
                // 监听账户变化
                window.ethereum.on('accountsChanged', (accounts) => {
                    if (accounts.length === 0) {
                        addLog('钱包已断开', 'warning');
                        disconnectWallet();
                    } else {
                        userAddress = accounts[0];
                        const newShortAddress = userAddress.substring(0, 6) + '...' + userAddress.substring(userAddress.length - 4);
                        walletAddress.textContent = newShortAddress;
                        addLog(`账户已切换: ${newShortAddress}`, 'info');
                    }
                });
                
                // 监听网络变化
                window.ethereum.on('chainChanged', (chainId) => {
                    addLog('网络已切换，重新加载页面...', 'info');
                    window.location.reload();
                });
                
            } catch (error) {
                console.error('连接钱包失败:', error);
                addLog('连接钱包失败: ' + error.message, 'error');
            }
        }
        
        // 断开钱包
        function disconnectWallet() {
            userAddress = null;
            web3 = null;
            walletAddress.style.display = 'none';
            setContractBtn.style.display = 'none';
            connectWalletBtn.disabled = false;
            connectWalletBtn.innerHTML = '<span>连接钱包</span>';
            updateStatus(false);
            
            contractStatus.textContent = '未连接';
            rebPrice.textContent = '0 USDT';
            rebReserve.textContent = '0';
            usdtReserve.textContent = '0';
        }
        
        // 更新网络信息
        function updateNetworkInfo(chainId) {
            const networks = {
                1: '以太坊主网',
                3: 'Ropsten',
                4: 'Rinkeby',
                5: 'Goerli',
                42: 'Kovan',
                56: '币安智能链',
                97: '币安测试链',
                137: 'Polygon',
                80001: 'Mumbai',
                42161: 'Arbitrum',
                421611: 'Arbitrum测试网',
                10: 'Optimism',
                69: 'Optimism测试网'
            };
            
            networkName.textContent = networks[chainId] || `网络 ${chainId}`;
        }
        
        // 设置合约地址
        function setContractAddress() {
            // const address = prompt('请输入合约地址:');
            // if (!address) return;
            
            // if (!web3.utils.isAddress(address)) {
            //     addLog('无效的合约地址', 'error');
            //     alert('请输入有效的以太坊地址');
            //     return;
            // }
            
            contractAddress = '0x0b4Bb9d2f89a72D544B5063B3fF3C696e37Af02a';
            initializeContract();
        }
        
        // 初始化合约
        function initializeContract() {
            if (!web3 || !contractAddress) return;
            
            try {
                contract = new web3.eth.Contract(contractABI, contractAddress);
                addLog(`合约已初始化: ${contractAddress.substring(0, 10)}...`, 'success');
                loadContractData();
                
                // 开始监听数据变化
                setInterval(loadContractData, 10000); // 每10秒更新一次
                
            } catch (error) {
                console.error('初始化合约失败:', error);
                addLog('初始化合约失败: ' + error.message, 'error');
            }
        }
        
        // 加载合约数据
        async function loadContractData() {
            if (!contract) return;
            
            try {
                // 获取合约状态
                const enabled = await contract.methods.enabled().call();
                contractStatus.textContent = enabled ? '已启用' : '已禁用';
                contractStatus.style.color = enabled ? '#06d6a0' : '#ef476f';
                
                // 更新开关状态
                enabledToggle.checked = enabled;
                enabledStatus.textContent = enabled ? '合约已启用' : '合约已禁用';
                
                // 获取价格
                const price = await contract.methods.rebToUsdtPrice().call();
                const formattedPrice = web3.utils.fromWei(price, 'ether');
                rebPrice.textContent = `${formattedPrice} USDT`;
                
                // 获取储备
                const reserves = await contract.methods.getTokenReserves().call();
                const rebReserveValue = web3.utils.fromWei(reserves.rebReserve, 'ether');
                const usdtReserveValue = web3.utils.fromWei(reserves.usdtReserve, 'ether');
                
                rebReserve.textContent = parseFloat(rebReserveValue).toLocaleString();
                usdtReserve.textContent = parseFloat(usdtReserveValue).toLocaleString();
                
            } catch (error) {
                console.error('加载合约数据失败:', error);
                addLog('加载合约数据失败: ' + error.message, 'error');
            }
        }
        
        // 计算预估USDT
        function calculateEstimatedUsdt() {
            if (!rebAmountInput.value || parseFloat(rebAmountInput.value) <= 0) {
                estimatedUsdt.textContent = '0';
                return;
            }
            
            const rebAmount = parseFloat(rebAmountInput.value);
            // 这里应该从合约获取实际价格，这里用示例价格
            const price = 100; // 假设1 REB = 100 USDT
            estimatedUsdt.textContent = (rebAmount * price).toFixed(2);
        }
        
        // 执行兑换
        async function exchangeREBtoUSDT() {
            if (!contract || !userAddress) {
                addLog('请先连接钱包并设置合约', 'error');
                return;
            }
            
            const rebAmount = rebAmountInput.value;
            if (!rebAmount || parseFloat(rebAmount) <= 0) {
                addLog('请输入有效的REB数量', 'error');
                return;
            }
            
            try {
                addLog(`开始兑换 ${rebAmount} REB...`, 'info');
                exchangeBtn.disabled = true;
                exchangeBtn.innerHTML = '<span>兑换中...</span>';
                
                const rebAmountWei = web3.utils.toWei(rebAmount, 'ether');
                
                const tx = await contract.methods.exchangeREBtoUSDT(rebAmountWei)
                    .send({ from: userAddress });
                
                addLog(`兑换成功! 交易哈希: ${tx.transactionHash.substring(0, 20)}...`, 'success');
                addLog(`${rebAmount} REB 已成功兑换`, 'success');
                
                // 清空输入
                rebAmountInput.value = '';
                estimatedUsdt.textContent = '0';
                
                // 刷新数据
                setTimeout(loadContractData, 3000);
                
            } catch (error) {
                console.error('兑换失败:', error);
                addLog('兑换失败: ' + error.message, 'error');
            } finally {
                exchangeBtn.disabled = false;
                exchangeBtn.innerHTML = '<span>执行兑换</span>';
            }
        }
        
        // 更新合约状态
        async function updateContractStatus() {
            if (!contract || !userAddress) {
                addLog('请先连接钱包并设置合约', 'error');
                return;
            }
            
            const newStatus = enabledToggle.checked;
            
            try {
                addLog(`${newStatus ? '启用' : '禁用'}合约中...`, 'info');
                updatePriceBtn.disabled = true;
                
                const tx = await contract.methods.setEnabled(newStatus)
                    .send({ from: userAddress });
                
                addLog(`合约已${newStatus ? '启用' : '禁用'}! 交易哈希: ${tx.transactionHash.substring(0, 20)}...`, 'success');
                
                // 刷新数据
                setTimeout(loadContractData, 3000);
                
            } catch (error) {
                console.error('更新合约状态失败:', error);
                addLog('更新合约状态失败: ' + error.message, 'error');
                enabledToggle.checked = !newStatus;
            } finally {
                updatePriceBtn.disabled = false;
            }
        }
        
        // 更新价格
        async function updateRebPrice() {
            if (!contract || !userAddress) {
                addLog('请先连接钱包并设置合约', 'error');
                return;
            }
            
            const newPrice = newPriceInput.value;
            if (!newPrice || parseFloat(newPrice) <= 0) {
                addLog('请输入有效的价格', 'error');
                return;
            }
            
            try {
                addLog(`设置新价格: ${newPrice} USDT...`, 'info');
                updatePriceBtn.disabled = true;
                updatePriceBtn.innerHTML = '<span>更新中...</span>';
                
                const priceWei = web3.utils.toWei(newPrice, 'ether');
                
                const tx = await contract.methods.setRebToUsdtPrice(priceWei)
                    .send({ from: userAddress });
                
                addLog(`价格更新成功! 交易哈希: ${tx.transactionHash.substring(0, 20)}...`, 'success');
                addLog(`REB/USDT价格已更新为: ${newPrice}`, 'success');
                
                // 清空输入
                newPriceInput.value = '';
                
                // 刷新数据
                setTimeout(loadContractData, 3000);
                
            } catch (error) {
                console.error('更新价格失败:', error);
                addLog('更新价格失败: ' + error.message, 'error');
            } finally {
                updatePriceBtn.disabled = false;
                updatePriceBtn.innerHTML = '<span>更新价格</span>';
            }
        }
        
        // 提取代币
        async function withdrawTokens() {
            if (!contract || !userAddress) {
                addLog('请先连接钱包并设置合约', 'error');
                return;
            }
            
            const token = withdrawTokenSelect.value;
            const amount = withdrawAmountInput.value;
            
            if (!token) {
                addLog('请选择要提取的代币', 'error');
                return;
            }
            
            if (!amount || parseFloat(amount) <= 0) {
                addLog('请输入有效的提取数量', 'error');
                return;
            }
            
            try {
                addLog(`提取 ${amount} ${token}...`, 'info');
                withdrawBtn.disabled = true;
                withdrawBtn.innerHTML = '<span>提取中...</span>';
                
                // 获取代币地址
                let tokenAddress;
                if (token === 'REB') {
                    tokenAddress = await contract.methods.REB().call();
                } else if (token === 'USDT') {
                    tokenAddress = await contract.methods.USDT().call();
                }
                
                const amountWei = web3.utils.toWei(amount, 'ether');
                
                const tx = await contract.methods.withdrawToken(tokenAddress, amountWei)
                    .send({ from: userAddress });
                
                addLog(`提取成功! 交易哈希: ${tx.transactionHash.substring(0, 20)}...`, 'success');
                addLog(`${amount} ${token} 已提取到您的钱包`, 'success');
                
                // 清空输入
                withdrawTokenSelect.value = '';
                withdrawAmountInput.value = '';
                
                // 刷新数据
                setTimeout(loadContractData, 3000);
                
            } catch (error) {
                console.error('提取代币失败:', error);
                addLog('提取代币失败: ' + error.message, 'error');
            } finally {
                withdrawBtn.disabled = false;
                withdrawBtn.innerHTML = '<span>提取代币</span>';
            }
        }
        
        // 事件监听
        connectWalletBtn.addEventListener('click', connectWallet);
        setContractBtn.addEventListener('click', setContractAddress);
        rebAmountInput.addEventListener('input', calculateEstimatedUsdt);
        exchangeBtn.addEventListener('click', exchangeREBtoUSDT);
        enabledToggle.addEventListener('change', updateContractStatus);
        updatePriceBtn.addEventListener('click', updateRebPrice);
        withdrawBtn.addEventListener('click', withdrawTokens);
        
        // 页面加载时检查是否已连接钱包
        window.addEventListener('load', async () => {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                    if (accounts.length > 0) {
                        userAddress = accounts[0];
                        web3 = new Web3(window.ethereum);
                        
                        const shortAddress = userAddress.substring(0, 6) + '...' + userAddress.substring(userAddress.length - 4);
                        walletAddress.textContent = shortAddress;
                        walletAddress.style.display = 'block';
                        updateStatus(true);
                        setContractBtn.style.display = 'inline-flex';
                        connectWalletBtn.disabled = true;
                        connectWalletBtn.innerHTML = '<span>已连接</span>';
                        
                        const chainId = await web3.eth.getChainId();
                        updateNetworkInfo(chainId);
                        
                        addLog(`自动连接成功: ${shortAddress}`, 'success');
                    }
                } catch (error) {
                    console.error('自动连接失败:', error);
                }
            }
            
            addLog('页面加载完成，请连接钱包开始使用', 'info');
        });
    </script>
</body>
</html>
